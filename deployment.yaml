apiVersion: apps/v1
kind: Deployment
metadata:
  name: rivera-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rivera
  template:
    metadata:
      labels:
        app: rivera
    spec:
      containers:
      - name: rivera-container
        image: rivera-app
        ports:
        - containerPort: 80